# Cornerstone Bridge 配置示例（复制为 cornerstone-bridge.config.toml 后修改）
# 仍支持旧版 cornerstone-bridge.config.json；新安装推荐使用本文件。

# ========== TCP 网关（远程客户端 / cornerstone-cli 连接） ==========
# 监听地址；0.0.0.0 表示本机所有网卡
host = "0.0.0.0"
# TCP 网关端口
port = 54321

# ========== 对内 REST API（网页、控制台、instrument_rq 等） ==========
# REST 监听地址（仅本机访问时可用 127.0.0.1）
bridge_api_host = "127.0.0.1"
# REST 端口
bridge_api_port = 8081

# ========== 上游仪器（真实 Cornerstone TCP） ==========
# 仪器主机名或 IP
upstream_host = "127.0.0.1"
# 仪器端口（常见 12345）
upstream_port = 12345
# 上游静默超过该秒数时 Bridge 才主动发 Heartbeat；0 = 禁用主动心跳
# 若仪器已对网关 TCP 客户端有应答或其它上行报文，则不发心跳、视为在线
upstream_heartbeat_interval = 0
# inner 长度帧跨多条 TCP 时等待拼接的超时（秒）；0 = 不等待
upstream_inner_reassembly_timeout = 5
# 上游 recv 缓冲空闲超过该秒数，下次收包前清空缓冲
upstream_recv_idle_clear = 5
# 连续主动 Heartbeat 无应答达到此次数，回收上游 TCP
upstream_heartbeat_fail_max = 2
# 连续仪器指令无应答或 ErrorCode≠0 达到此次数，回收上游 TCP
upstream_command_fail_max = 3
# TCP 客户端经网关转发后，等待上游应答的超时（秒）
upstream_client_forward_timeout = 10
# Bridge 主动 Heartbeat 等待应答超时（秒）；0 = max(转发超时, 15)
upstream_heartbeat_wait_timeout = 0
# 无任何上行活动超过该秒数则回收上游 TCP；0 = max(3×心跳间隔, 90)
upstream_activity_stale_seconds = 0
# 回收上游 TCP 时，等待读循环 cancel 的最长时间（秒）
upstream_read_cancel_timeout = 5
# 定时检查 activity_stale 的间隔（秒）；0 = 关闭定时巡检
upstream_stale_check_interval = 30
# 上游断线或回收后是否自动重连
upstream_auto_reconnect = true

# ========== 协议与队列 ==========
# 帧编码：utf16 / utf-16-le（与仪器一致）
encoding = "utf16"
# 网页截留的 AddSamples 队列最大条数
add_samples_queue_size = 8
# 是否将截留队列持久化到磁盘
persist_add_samples_queue = true
# 队列 JSON 路径；支持 %APPDATA% 等环境变量
add_samples_queue_persist_file = "%APPDATA%\\CornerstoneMock\\cornerstone-bridge.add-samples-queue.json"
# 来自该 IP 的 AddSamples 直通上游；其它来源仍进网页队列（仅一个特权 IP）
privileged_add_samples_host = "127.0.0.1"
# 拒绝这些 IP 建立 TCP 连接（启动时载入；变更后实时写回本文件）
blocked_connect_hosts = []
# 允许连接但丢弃 Logon（不转发仪器、不合成登录应答）
blocked_logon_hosts = []

# ========== 会话与转发行为 ==========
# true = 每次客户端 Logon 都转发仪器；false = 上游曾成功后对后续客户端合成 Logon
no_synthetic_logon = false
# 向 TCP 客户端轮询推送异步 CornerstoneMessage 的间隔（秒）；0 = 仅连接时 probe
async_message_interval = 0
# true = 复用网关与仪器的长连接（推荐）
instrument_long_connection = true

# ========== 网页代登仪器（可选） ==========
web_user = "remote"
web_password = "control"

# ========== 日志 ==========
# 控制台：debug | info | warning | error
log_level = "info"
log_verbose_gateway = false
log_file = "%APPDATA%\\CornerstoneMock\\logs\\bridge.log"
log_file_level = "info"
log_file_max_mb = 2
log_file_backup_count = 3
log_throttle_interval_s = 300
